<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" width="900" height="1400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0038A8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0C2D6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0038A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="softShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="0" cy="0" r="250" fill="#FBBF24" opacity="0.04"/>
  <circle cx="900" cy="1400" r="300" fill="#10B981" opacity="0.04"/>
  <circle cx="800" cy="100" r="150" fill="#60A5FA" opacity="0.05"/>
  <circle cx="100" cy="1200" r="180" fill="#FBBF24" opacity="0.03"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="6" fill="url(#accent)"/>

  <!-- ============================================================ -->
  <!-- HEADER SECTION -->
  <!-- ============================================================ -->
  <rect x="260" y="32" width="380" height="38" rx="19" fill="url(#accent)" filter="url(#softShadow)"/>
  <text x="450" y="57" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#0C2D6B" text-anchor="middle" font-weight="700" letter-spacing="2">SMART BARANGAY KIOSK</text>

  <!-- Big pointing hand + headline -->
  <text x="450" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="white" text-anchor="middle" font-weight="800">MAG-REQUEST</text>
  <text x="450" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="60" fill="white" text-anchor="middle" font-weight="800">DITO! 👆</text>

  <!-- Subheadline  -->
  <text x="450" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#93C5FD" text-anchor="middle">I-tap lang ang tablet para mag-request ng barangay document</text>

  <!-- Divider -->
  <rect x="350" y="270" width="200" height="3" rx="2" fill="url(#accent)"/>

  <!-- No account badge -->
  <rect x="200" y="292" width="500" height="48" rx="24" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="450" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="700">✅ WALANG KAILANGAN NA ACCOUNT O LOGIN</text>

  <!-- ============================================================ -->
  <!-- STEPS SECTION -->
  <!-- ============================================================ -->
  <rect x="50" y="365" width="800" height="52" rx="14" fill="url(#cardGrad)" stroke="#FBBF24" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="450" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#FBBF24" text-anchor="middle" font-weight="700" letter-spacing="1">PAANO GAMITIN ANG KIOSK?</text>

  <!-- Step 1 -->
  <circle cx="120" cy="468" r="28" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="120" y="476" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">1</text>
  <text x="168" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="white" font-weight="700">I-tap ang "Continue"</text>
  <text x="168" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD">Sa Welcome screen, i-tap ang Continue para magsimula</text>

  <!-- Step divider line -->
  <line x1="120" y1="500" x2="120" y2="530" stroke="#FBBF24" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 2 -->
  <circle cx="120" cy="558" r="28" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="120" y="566" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">2</text>
  <text x="168" y="548" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="white" font-weight="700">Pumili ng path</text>
  <text x="168" y="570" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD">"Identity Search" kung may record na — o "I am not listed" kung bago</text>

  <!-- Step divider line -->
  <line x1="120" y1="590" x2="120" y2="620" stroke="#FBBF24" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 3 -->
  <circle cx="120" cy="648" r="28" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="120" y="656" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">3</text>
  <text x="168" y="638" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="white" font-weight="700">Hanapin ang pangalan o punan ang form</text>
  <text x="168" y="660" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD">I-type ang pangalan para i-search, o punan ang personal info form</text>

  <!-- Step divider line -->
  <line x1="120" y1="680" x2="120" y2="710" stroke="#FBBF24" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 4 -->
  <circle cx="120" cy="738" r="28" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="120" y="746" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">4</text>
  <text x="168" y="728" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="white" font-weight="700">Pumili ng document at purpose</text>
  <text x="168" y="750" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD">Clearance, Indigency, Residency, atbp. — tapos ilagay ang dahilan</text>

  <!-- Step divider line -->
  <line x1="120" y1="770" x2="120" y2="800" stroke="#FBBF24" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 5 -->
  <circle cx="120" cy="828" r="28" fill="url(#greenAccent)" filter="url(#softShadow)"/>
  <text x="120" y="836" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">5</text>
  <text x="168" y="818" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="white" font-weight="700">I-submit at kunin ang receipt! 🧾</text>
  <text x="168" y="840" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD">I-confirm ang request — auto-print ang receipt na may reference number</text>

  <!-- SMS note -->
  <rect x="50" y="880" width="800" height="42" rx="12" fill="url(#cardGrad)" stroke="#93C5FD" stroke-width="1" stroke-opacity="0.3"/>
  <text x="450" y="907" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#93C5FD" text-anchor="middle">📱 Ma-notify kayo via SMS kapag ready na ang document para i-pickup!</text>

  <!-- ============================================================ -->
  <!-- AVAILABLE DOCUMENTS -->
  <!-- ============================================================ -->
  <text x="450" y="968" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#FBBF24" text-anchor="middle" font-weight="700" letter-spacing="1">📄 AVAILABLE DOCUMENTS</text>

  <!-- Row 1 -->
  <rect x="50" y="985" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="178" y="1011" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Barangay Clearance</text>

  <rect x="323" y="985" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="450" y="1011" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Certificate of Indigency</text>

  <rect x="596" y="985" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="723" y="1011" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Certificate of Residency</text>

  <!-- Row 2 -->
  <rect x="50" y="1035" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="178" y="1061" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Good Moral Character</text>

  <rect x="323" y="1035" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="450" y="1061" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">First Time Job Seeker</text>

  <rect x="596" y="1035" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="723" y="1061" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Business Clearance</text>

  <!-- Row 3 -->
  <rect x="50" y="1085" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="178" y="1111" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Solo Parent Cert.</text>

  <rect x="323" y="1085" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="450" y="1111" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Certification PDA</text>

  <rect x="596" y="1085" width="255" height="40" rx="10" fill="url(#cardGrad)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="723" y="1111" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Monthly Income Cert.</text>

  <!-- ============================================================ -->
  <!-- REMINDERS SECTION -->
  <!-- ============================================================ -->
  <rect x="50" y="1148" width="385" height="135" rx="16" fill="url(#cardGrad)" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.3"/>
  <text x="242" y="1180" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#FBBF24" text-anchor="middle" font-weight="700">💡 REMINDERS</text>
  <text x="75" y="1205" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#CBD5E1">
    <tspan x="75" dy="0">• Dalhin ang CTC/Cedula # para sa clearance</tspan>
    <tspan x="75" dy="20">• Alamin ang document na kailangan niyo</tspan>
    <tspan x="75" dy="20">• Hintayin ang SMS notification</tspan>
    <tspan x="75" dy="20">• Dalhin ang receipt kapag mag-claim</tspan>
  </text>

  <rect x="465" y="1148" width="385" height="135" rx="16" fill="url(#cardGrad)" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="657" y="1180" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#34D399" text-anchor="middle" font-weight="700">⚡ OFFLINE MODE</text>
  <text x="490" y="1205" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#CBD5E1">
    <tspan x="490" dy="0">• Gumagana kahit walang internet!</tspan>
    <tspan x="490" dy="20">• Ang request ay i-save sa device</tspan>
    <tspan x="490" dy="20">• Auto-sync kapag may connection</tspan>
    <tspan x="490" dy="20">• Makakakuha pa rin kayo ng receipt</tspan>
  </text>

  <!-- ============================================================ -->
  <!-- FOOTER -->
  <!-- ============================================================ -->
  <rect x="0" y="1310" width="900" height="90" fill="#06183D"/>
  <text x="450" y="1342" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">Para sa thesis purposes lamang • In partnership with Brgy. Maangas &amp; Brgy. Santa Maria de Presentacion</text>
  <text x="450" y="1367" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Kung may katanungan, lumapit sa barangay secretary o admin desk</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1394" width="900" height="6" fill="url(#accent)"/>
</svg>
